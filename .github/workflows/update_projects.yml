name: Update GitHub Data

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual triggering

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup jq
        run: sudo apt-get install jq -y

      - name: Run data fetch script
        env:
          # Use a GitHub secret for the Personal Access Token
          GIT_OMNIKON_ALL: ${{ secrets.GIT_OMNIKON_ALL }}
        run: |
          chmod +x ./fetch_github_data.sh
          # Create a dummy .env file so the script does not fail if it tries to source it
          echo "GIT_OMNIKON_ALL=${GIT_OMNIKON_ALL}" > .env
          ./fetch_github_data.sh
          # Remove dummy .env so it doesn't get committed
          rm .env

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update github_summary.json with latest org data"
          file_pattern: public/github_summary.json
